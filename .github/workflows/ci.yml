name: Next.js CI/CD Pipeline

on:
  pull_request:
    branches:
      - main # or 'master' depending on your default branch

jobs:
  build-and-check:
    name: Build and Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22 # Next.js 15/16 works best with Node 20+
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci # 'ci' is faster and strictly follows your package-lock.json

      - name: 🕵️ Run Linter
        run: npm run lint

      - name: 🏗️ Build Next.js app
        run: npm run build